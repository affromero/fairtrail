name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/web/prisma/schema.prisma

      - name: Lint
        run: npm run lint --workspace=@fairtrail/web

      - name: Typecheck
        run: npm run typecheck --workspace=@fairtrail/web

      - name: Build
        run: npm run build --workspace=@fairtrail/web
